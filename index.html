<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="theme-color" content="#1E1E1E">
    <title>Equilíbrio Produtivo</title>
    
    <link rel="icon" type="image/png" href="./images/logo.png">
    <link rel="apple-touch-icon" href="./images/Logo%20100.png">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Tailwind CSS (CDN for MVP) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Firebase CDNs (Compat v9) -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Tailwind Configuration (MVP fallback) -->
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#333333",
              "surface-container-low": "#242424",
              "primary": "#3b82f6"
            }
          }
        }
      }
    </script>
</head>
<body class="antialiased overflow-hidden">

<!-- SPLASH / LOGIN TELA -->
<div id="auth-screen" class="fixed inset-0 z-[100] bg-[#1a1a1a] flex flex-col items-center justify-center transition-all duration-500">
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <img src="./images/logo.png" alt="" class="w-full h-full object-cover scale-125 opacity-20 blur-[1px]" />
        <div class="absolute inset-0 bg-gradient-to-b from-[#101010]/35 via-[#1a1a1a]/88 to-[#1a1a1a]"></div>
    </div>
    <div class="flex flex-col items-center gap-6 max-w-sm w-full px-6">
        <div class="w-28 h-28 rounded-[36px] bg-white/5 p-4 border border-white/10 backdrop-blur-xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex items-center justify-center">
            <img src="./images/logo.png" alt="Equilíbrio Produtivo" class="w-full h-full object-contain">
        </div>
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold text-white font-headline">Equilíbrio<br/><span class="text-primary italic">Produtivo</span></h1>
            <p class="text-on-surface-variant text-sm font-medium">Sincronize sua rotina, alcance seu potencial.</p>
        </div>

        <div id="auth-loading" class="mt-8 flex items-center justify-center">
            <div class="w-6 h-6 border-2 border-white/20 border-t-primary rounded-full animate-spin"></div>
        </div>

        <div id="auth-login-box" class="w-full mt-8 flex flex-col gap-4 hidden">
            <button id="btn-login-google" class="w-full bg-white text-black font-extrabold py-4 rounded-[20px] active:scale-95 transition-all text-sm flex items-center justify-center gap-3">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continuar com Google
            </button>
        </div>
    </div>
</div>

<header id="main-header" class="fixed top-0 w-full z-50 bg-[#1E1E1E]/80 backdrop-blur-xl flex items-center justify-between px-6 py-4 transition-all duration-300 ease-in-out shadow-[0_10px_40px_-10px_rgba(0,0,0,0.04)] opacity-0 pointer-events-none">
    <div class="flex flex-col flex-1">
        <span class="text-3xl font-extrabold tracking-tighter text-white font-headline" id="header-title"><span class="text-xl accent-text">Bom dia</span><br/>Bernardo</span>
    </div>
    <div class="flex items-center text-right flex-shrink-0 ml-4 gap-3">
        <div id="user-avatar" class="w-8 h-8 rounded-full bg-surface-highest border border-white/10 flex-shrink-0 overflow-hidden cursor-pointer" onclick="window.app?.signOut()"></div>
        <span id="header-date" class="text-xs sm:text-sm font-extrabold accent-text capitalize tracking-tight whitespace-nowrap"></span>
    </div>
</header>

<main class="mt-24 px-6 max-w-2xl mx-auto opacity-0 pointer-events-none transition-all duration-500" id="app-container">

    <!-- Tab 1: Resumo (Dashboard) -->
    <section id="tab-dashboard" class="tab-content active">
        <!-- Dashboard Content will be rendered by ui-dashboard.js -->
        <div id="dashboard-root">
            <p class="text-center text-on-surface-variant mt-10">Carregando métricas...</p>
        </div>
    </section>

    <!-- Tab 2: Planner (Heatmap, Diário, Kanban) -->
    <section id="tab-planner" class="tab-content">
        <!-- Planner Content will be rendered by planner-controller.js -->
        <div id="planner-root">
             <p class="text-center text-on-surface-variant mt-10">Carregando plano...</p>
        </div>
    </section>

    <!-- Tab 3: Financeiro -->
    <section id="tab-finances" class="tab-content">
        <!-- Finances Content will be rendered by ui-finances.js -->
        <div id="finances-root">
             <p class="text-center text-on-surface-variant mt-10">Carregando finanças...</p>
        </div>
    </section>



</main>

<!-- Bottom Navigation Bar -->
<nav id="bottom-nav" class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#1E1E1E]/80 backdrop-blur-xl shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.4)] border-t border-white/5 opacity-0 pointer-events-none transition-all duration-500 translate-y-full">
    
    <div class="nav-item flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:text-white transition-all active:scale-90 duration-200 cursor-pointer accent-text" data-target="tab-dashboard" data-title="---" id="nav-dashboard">
        <span class="material-symbols-outlined filled" data-icon="dashboard">dashboard</span>
        <span class="font-headline text-[11px] font-medium tracking-wide uppercase">Resumo</span>
    </div>

    <div class="nav-item flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:text-white transition-all active:scale-90 duration-200 cursor-pointer" data-target="tab-planner" data-title="Planner" id="nav-planner">
        <span class="material-symbols-outlined" data-icon="radar">radar</span>
        <span class="font-headline text-[11px] font-medium tracking-wide uppercase">Planner</span>
    </div>

    <div class="nav-item flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:text-white transition-all active:scale-90 duration-200 cursor-pointer" data-target="tab-finances" data-title="Financeiro" id="nav-finances">
        <span class="material-symbols-outlined" data-icon="payments">payments</span>
        <span class="font-headline text-[11px] font-medium tracking-wide uppercase">Finanças</span>
    </div>

</nav>

<!-- JavaScript Modules -->
<script type="module" src="./js/app.js"></script>

</body>
</html>
